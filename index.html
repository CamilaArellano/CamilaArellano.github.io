---
layout: default
title: Inicio
---

<section class="featured-post">
    <h2>Última Entrada</h2>

    {% assign latest = site.posts.first %}

    <article>
        <h3>
            <a href="{{ latest.url }}">{{ latest.title }}</a>
        </h3>
        <p>{{ latest.excerpt }}</p>
        <a href="{{ latest.url }}" class="btn">Leer más</a>
    </article>
</section>
